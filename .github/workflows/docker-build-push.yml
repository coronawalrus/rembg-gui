name: Build and Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
    # Automatically build and tag when you push a release tag like v1.0.0
    tags: [ 'v*.*.*' ]
  pull_request:
    # Build on PRs to ensure the Dockerfile still works, but don't push
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

env:
  REGISTRY: ghcr.io
  # github.repository is the "owner/repo_name" format
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # Sets permissions granted to the GITHUB_TOKEN for the actions in this job.
    permissions:
      contents: read
      packages: write # Crucial for pushing to the GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        # Only log in if it's not a pull request
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Generates tags like 'latest', branch names, and semver tags
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push the image only if it's not a PR. PRs will just do a test build.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enables caching using GitHub Actions cache to dramatically speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
